<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ChatADC Evaluations · Runs</title>
<style>
  :root {
    --bg: #0b0d10; --panel: #12151a; --panel-2: #171b22;
    --border: #232832; --text: #e7ecf3; --muted: #8a94a6;
    --accent: #7c5cff; --ok: #34d399; --warn: #fbbf24; --bad: #f87171;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 ui-sans-serif, -apple-system, "Segoe UI", Roboto, Inter, sans-serif; }
  a { color: var(--accent); text-decoration: none; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 20px 80px; }
  h1 { margin: 0 0 4px; font-size: 22px; letter-spacing: -0.01em; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  table { width: 100%; border-collapse: collapse; background: var(--panel);
    border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid var(--border); }
  th { background: var(--panel-2); font-weight: 600; font-size: 12px;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--panel-2); }
  .score { font-weight: 600; }
  .score .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--ok); margin-right: 6px; vertical-align: middle; }
  .dot.warn { background: var(--warn); } .dot.bad { background: var(--bad); }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 999px;
    background: var(--panel-2); border: 1px solid var(--border); color: var(--muted); font-size: 11px; }
  .btn { background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
    font-family: inherit; text-decoration: none; display: inline-block; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .meta { color: var(--muted); font-size: 12px; }
  .empty { padding: 40px; text-align: center; color: var(--muted); }
</style>
</head>
<body>
  <div class="wrap">
    <h1>ChatADC Evaluations</h1>
    <div class="sub">All evaluation runs, most recent first.</div>

    <table id="runs-table">
      <thead>
        <tr>
          <th>Date</th><th>Models</th><th>Mode</th><th>Judge</th>
          <th>Cases</th><th>Avg Score</th><th>Avg Latency</th><th></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

<script>
function scoreClass(s) { if (s == null) return ""; if (s >= 4) return ""; if (s >= 3) return "warn"; return "bad"; }

async function load() {
  const res = await fetch("reports/index.json", { cache: "no-store" });
  if (!res.ok) throw new Error("No manifest yet.");
  return res.json();
}

function render(runs) {
  const tbody = document.querySelector("#runs-table tbody");
  if (!runs.length) {
    tbody.innerHTML = `<tr><td colspan="8" class="empty">No runs yet.</td></tr>`;
    return;
  }
  tbody.innerHTML = runs.map(r => {
    const score = r.avg_score;
    const scoreCell = score == null ? '<span class="meta">—</span>' :
      `<span class="score"><span class="dot ${scoreClass(score)}"></span>${score.toFixed(2)} / 5</span>`;
    return `<tr>
      <td>${new Date(r.timestamp).toLocaleString()}</td>
      <td>${(r.models || []).map(m => `<span class="pill">${m}</span>`).join(" ")}</td>
      <td class="meta">${r.mode}</td>
      <td class="meta">${r.judge}</td>
      <td class="meta">${r.cases_count}</td>
      <td>${scoreCell}</td>
      <td class="meta">${r.avg_latency != null ? r.avg_latency.toFixed(2) + "s" : "—"}</td>
      <td><a class="btn" href="report.html?run=${encodeURIComponent(r.id)}">View</a></td>
    </tr>`;
  }).join("");
}

load().then(render).catch(err => {
  document.querySelector("#runs-table tbody").innerHTML =
    `<tr><td colspan="8" class="empty">${err.message}</td></tr>`;
});
</script>
</body>
</html>
